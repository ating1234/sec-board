<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FM05C063L9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FM05C063L9');
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>管理員登入 — 資安新聞分析平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon { font-size: 48px; display: block; margin-bottom: 8px; }
    .logo-title { font-size: 20px; font-weight: 700; color: #58a6ff; }
    .logo-sub { font-size: 13px; color: #8b949e; margin-top: 4px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 6px; font-weight: 500; }
    input[type="password"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #58a6ff;
    }
    .btn-login {
      width: 100%;
      background: #58a6ff;
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    .btn-login:hover { background: #388bfd; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.4);
      color: #ff7b72;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #8b949e;
    }
    .footer-hint a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <img src="/static/wangwang-logo.jpeg" alt="旺旺" style="height:72px;display:block;margin:0 auto 8px;">
      <div class="logo-title">資安新聞分析平台</div>
      <div class="logo-sub">管理員登入</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">管理員密碼</label>
        <input type="password" id="password" placeholder="輸入密碼" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">🔐 登入</button>
    </form>

    <div class="footer-hint">
      <a href="/">← 返回儀表板</a>
    </div>
  </div>

  <script>
    const form   = document.getElementById('loginForm');
    const input  = document.getElementById('password');
    const btn    = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errMsg.textContent = msg;
      errMsg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = input.value.trim();
      if (!password) { showError('請輸入密碼'); return; }

      btn.disabled = true;
      btn.textContent = '驗證中...';
      errMsg.style.display = 'none';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'same-origin',
        });

        if (res.ok) {
          // 取得 redirect 目標（預設 /admin）
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/admin';
        } else {
          const data = await res.json().catch(() => ({}));
          showError(data.detail || '密碼錯誤，請重試');
          input.value = '';
          input.focus();
        }
      } catch(e) {
        showError('無法連線至伺服器，請確認後端是否運行中');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔐 登入';
      }
    });
  </script>
</body>
</html>
